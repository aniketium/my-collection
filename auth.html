<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Inventory</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-text">inventory</span>
        <span class="logo-dot"></span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
      </div>
      <div class="nav-right"></div>
    </div>
  </nav>

  <!-- Auth Card -->
  <div class="auth-page">
    <div class="auth-card">
      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign in</button>
        <button class="auth-tab" data-tab="signup">Create account</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn-auth">Sign in</button>
        <div class="auth-error" id="loginError"></div>
      </form>

      <!-- Signup Form -->
      <form class="auth-form" id="signupForm" style="display:none">
        <div class="form-group">
          <label for="signupName">Display name</label>
          <input type="text" id="signupName" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="Min 6 characters" minlength="6" required>
        </div>
        <button type="submit" class="btn-auth">Create account</button>
        <div class="auth-error" id="signupError"></div>
      </form>

      <p class="auth-footer-note">
        Track everything you own. Be mindful about your possessions.
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script>
    // Redirect if already logged in
    (async () => {
      const session = await db.getSession();
      if (session) {
        window.location.href = 'dashboard.html';
        return;
      }
    })();

    // Tab switching
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const isLogin = tab.dataset.tab === 'login';
        document.getElementById('loginForm').style.display = isLogin ? '' : 'none';
        document.getElementById('signupForm').style.display = isLogin ? 'none' : '';
        document.title = isLogin ? 'Sign In — Inventory' : 'Create Account — Inventory';
      });
    });

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('loginError');
      errorEl.textContent = '';
      const btn = e.target.querySelector('.btn-auth');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        await db.signIn(
          document.getElementById('loginEmail').value,
          document.getElementById('loginPassword').value
        );
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });

    // Signup
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('signupError');
      errorEl.textContent = '';
      const btn = e.target.querySelector('.btn-auth');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        await db.signUp(
          document.getElementById('signupEmail').value,
          document.getElementById('signupPassword').value,
          document.getElementById('signupName').value
        );
        // Supabase sends confirmation email by default
        errorEl.style.color = 'var(--accent)';
        errorEl.textContent = 'Check your email for a confirmation link!';
        btn.textContent = 'Email sent';
      } catch (err) {
        errorEl.textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
