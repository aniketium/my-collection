<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Collection</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-text">inventory</span>
        <span class="logo-dot"></span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link active">Collection</a>
        <a href="browse.html" class="nav-link">Categories</a>
        <a href="about.html" class="nav-link">About</a>
      </div>
      <div class="nav-right">
        <span class="item-count" id="itemCount"></span>
        <button class="nav-search-btn" id="searchToggle" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Search Overlay -->
  <div class="search-overlay" id="searchOverlay">
    <div class="search-container">
      <div class="search-input-wrapper">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" placeholder="Search items..." autocomplete="off">
        <kbd class="search-kbd">esc</kbd>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <!-- Hero -->
  <header class="hero">
    <div class="hero-inner">
      <p class="hero-label">Personal inventory</p>
      <h1 class="hero-title">Things I own<br>& recommend.</h1>
      <div class="hero-stats" id="heroStats"></div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <!-- Filters -->
    <div class="toolbar">
      <div class="filter-pills" id="filterPills">
        <button class="pill active" data-category="all">All</button>
      </div>
      <div class="toolbar-right">
        <div class="view-toggle">
          <button class="view-btn active" data-view="grid" aria-label="Grid view">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" data-view="list" aria-label="List view">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
        </div>
        <select id="sortSelect" class="sort-select">
          <option value="featured">Featured</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="name">Name A-Z</option>
          <option value="brand">Brand</option>
        </select>
      </div>
    </div>

    <!-- Product Grid -->
    <div class="product-grid" id="productGrid"></div>

    <!-- Show More -->
    <div class="show-more-wrapper" id="showMoreWrapper" style="display:none">
      <button class="btn-show-more" id="showMoreBtn">Load more</button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span class="footer-logo">inventory<span class="logo-dot"></span></span>
        <p class="footer-note">A personal catalog of things I use and trust.</p>
      </div>
      <div class="footer-columns">
        <div class="footer-col">
          <h4>Pages</h4>
          <a href="index.html">Collection</a>
          <a href="browse.html">Categories</a>
          <a href="about.html">About</a>
        </div>
        <div class="footer-col">
          <h4>Categories</h4>
          <div id="footerCategories"></div>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <span>&copy; 2026</span>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
