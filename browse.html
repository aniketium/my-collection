<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse — Inventory</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-text">inventory</span>
        <span class="logo-dot"></span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About</a>
      </div>
      <div class="nav-right" id="navRight"></div>
    </div>
  </nav>

  <div class="about-content" style="text-align:center">
    <h1>Browse Collections</h1>
    <p>Discover what people own and recommend. This page is coming soon as more users join the platform.</p>
    <p style="margin-top:24px"><a href="auth.html" style="color:var(--accent);font-weight:500">Create your inventory &rarr;</a></p>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span class="footer-logo">inventory<span class="logo-dot"></span></span>
        <p class="footer-note">Track everything you own.</p>
      </div>
    </div>
    <div class="footer-bottom">
      <span>&copy; 2026 Inventory</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script>
    (async () => {
      const session = await db.getSession();
      const navRight = document.getElementById('navRight');
      if (session) {
        navRight.innerHTML = `<a href="dashboard.html" class="btn-nav-primary">My Inventory</a>`;
      } else {
        navRight.innerHTML = `
          <a href="auth.html" class="nav-link">Sign in</a>
          <a href="auth.html" class="btn-nav-primary">Get started</a>
        `;
      }
    })();
  </script>
</body>
</html>
